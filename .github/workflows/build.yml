name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: windows-latest
            label: Windows
          - os: ubuntu-latest
            label: Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Qt dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libglib2.0-0 libxcb-xinerama0 libxcb-cursor0

      - name: Build
        run: pyinstaller SViewG.spec --noconfirm

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r SViewG-macOS.zip SViewG.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\SViewG -DestinationPath dist\SViewG-Windows.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd dist && tar -czf SViewG-Linux.tar.gz SViewG

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.label }}
          path: dist/SViewG-*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
